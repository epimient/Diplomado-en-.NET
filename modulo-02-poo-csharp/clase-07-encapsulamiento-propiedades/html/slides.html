    <script>
        const slides = [
            {
                title: "Portada",
                content: `<p class="eyebrow">Módulo 2 · Programación Orientada a Objetos</p>
                <h1>Encapsulamiento y Propiedades</h1>
                <p class="subtitle">Protege los datos de tus objetos y controla cómo se accede a ellos con propiedades, getters y setters.</p>
                <p style="color:var(--text-muted);font-size:0.85rem;">Clase 07 · Diplomado Programación con .NET</p>
                <p><span class="tag">Encapsulamiento</span> <span class="tag">Propiedades</span> <span class="tag">get/set</span> <span class="tag">private</span></p>`
            },
            {
                title: "¿Qué es encapsulamiento?",
                content: `<h2>Encapsulamiento</h2>
                <p>El <strong>encapsulamiento</strong> es el principio de ocultar los detalles internos de una clase y controlar cómo se accede a ellos.</p>
                <ul>
                    <li>Los campos (atributos) deben ser <strong>privados</strong> (<code>private</code>)</li>
                    <li>El acceso se hace mediante <strong>propiedades</strong> (<code>get</code>/<code>set</code>) o métodos públicos</li>
                    <li>Podemos <strong>validar</strong> datos antes de asignarlos</li>
                    <li>Podemos <strong>proteger</strong> el estado interno del objeto</li>
                </ul>
                <div class="comparison">
                    <div>
                        <h4>Sin encapsulamiento ❌</h4>
                        <code>public int edad;<br>p.edad = -5; // Inválido!</code>
                    </div>
                    <div>
                        <h4>Con encapsulamiento ✅</h4>
                        <code>private int edad;<br>p.Edad = -5; // Validación evita error</code>
                    </div>
                </div>`
            },
            {
                title: "Modificadores de acceso",
                content: `<h2>Modificadores de acceso</h2>
                <p>Controlan qué partes del programa pueden ver y usar los miembros de una clase.</p>
                <table>
                    <tr><th>Modificador</th><th>Acceso desde</th></tr>
                    <tr><td><code>public</code></td><td>Cualquier clase (totalmente accesible)</td></tr>
                    <tr><td><code>private</code></td><td>Solo la misma clase (nadie más)</td></tr>
                    <tr><td><code>protected</code></td><td>La misma clase y clases derivadas (herencia)</td></tr>
                    <tr><td><code>internal</code></td><td>Solo el mismo proyecto (assembly)</td></tr>
                </table>
                <pre><code>public class CuentaBancaria
{
    public string titular;       // Todos pueden leer/escribir
    private double saldo;        // Solo esta clase accede
    protected string numeroCuenta; // Esta clase + herederas

    public void MostrarSaldo()
    {
        // ✅ Acceso permitido (misma clase)
        Console.WriteLine($"Saldo: {saldo:C}");
    }
}

// Desde otra clase:
// cuenta.saldo = 500;  // ❌ Error: 'saldo' es private</code></pre>`
            },
            {
                title: "Propiedades (get/set)",
                content: `<h2>Propiedades en C#</h2>
                <p>Una <strong>propiedad</strong> es un miembro que combina un campo privado con métodos de acceso (<code>get</code> y <code>set</code>).</p>
                <h3>Sintaxis completa</h3>
                <pre><code>public class Persona
{
    private string nombre;  // Campo privado (backing field)

    public string Nombre    // Propiedad pública
    {
        get { return nombre; }
        set { nombre = value; }
    }
}</code></pre>
                <h3>Sintaxis auto-implementada (C# 3+)</h3>
                <pre><code>public class Persona
{
    public string Nombre { get; set; }
    public int Edad { get; set; }
}

// Uso:
Persona p = new Persona();
p.Nombre = "Ana";  // set
Console.WriteLine(p.Nombre);  // get</code></pre>
                <div class="callout callout--success"><strong>💡 <code>value</code> es una palabra clave contextual que representa el valor que se asigna en el setter.</strong></div>`
            },
            {
                title: "Propiedades con validación",
                content: `<h2>Propiedades con lógica de validación</h2>
                <p>La gran ventaja del encapsulamiento: podemos validar antes de asignar.</p>
                <pre><code>public class CuentaBancaria
{
    private double saldo;

    public double Saldo
    {
        get { return saldo; }
    }

    public void Depositar(double monto)
    {
        if (monto <= 0)
        {
            Console.WriteLine("❌ El monto debe ser positivo");
            return;
        }
        saldo += monto;
        Console.WriteLine($"✅ Depositados {monto:C}. Saldo: {saldo:C}");
    }

    public bool Retirar(double monto)
    {
        if (monto <= 0)
        {
            Console.WriteLine("❌ Monto inválido");
            return false;
        }
        if (monto > saldo)
        {
            Console.WriteLine("❌ Saldo insuficiente");
            return false;
        }
        saldo -= monto;
        Console.WriteLine($"✅ Retirados {monto:C}. Saldo: {saldo:C}");
        return true;
    }
}</code></pre>`
            },
            {
                title: "Propiedades de solo lectura",
                content: `<h2>Propiedades de solo lectura y solo escritura</h2>
                <p>Podemos restringir el acceso:</p>
                <table>
                    <tr><th>Tipo</th><th>Código</th><th>Comportamiento</th></tr>
                    <tr><td>Lectura/escritura</td><td><code>{ get; set; }</code></td><td>Se puede leer y escribir</td></tr>
                    <tr><td>Solo lectura</td><td><code>{ get; }</code></td><td>Solo se puede leer (init en constructor)</td></tr>
                    <tr><td>Privado set</td><td><code>{ get; private set; }</code></td><td>Público para leer, privado para escribir</td></tr>
                </table>
                <pre><code>public class Producto
{
    public string Codigo { get; }           // Solo lectura
    public string Nombre { get; set; }      // Lectura/escritura
    public double Precio { get; private set; } // Lectura pública, escritura privada

    public Producto(string codigo, string nombre, double precio)
    {
        Codigo = codigo;          // ✅ Se puede asignar en constructor
        Nombre = nombre;
        Precio = precio;
    }

    public void ActualizarPrecio(double nuevoPrecio)
    {
        if (nuevoPrecio > 0)
            Precio = nuevoPrecio;  // ✅ Escritura desde dentro
    }
}

// Uso:
var p = new Producto("P001", "Laptop", 999.99);
// p.Codigo = "X";  // ❌ Error: propiedad de solo lectura
// p.Precio = 500;  // ❌ Error: setter privado</code></pre>`
            },
            {
                title: "Propiedades calculadas",
                content: `<h2>Propiedades calculadas (solo get)</h2>
                <p>No necesitan un campo de respaldo. Se calculan en tiempo real:</p>
                <pre><code>public class Rectangulo
{
    public double Ancho { get; set; }
    public double Alto { get; set; }

    // Propiedad calculada (solo get)
    public double Area
    {
        get { return Ancho * Alto; }
    }

    // Propiedad calculada con expresión corporal (C# 6+)
    public double Perimetro => 2 * (Ancho + Alto);

    public Rectangulo(double ancho, double alto)
    {
        Ancho = ancho;
        Alto = alto;
    }
}

// Uso:
var r = new Rectangulo(10, 5);
Console.WriteLine($"Área: {r.Area}");       // 50
Console.WriteLine($"Perímetro: {r.Perimetro}");  // 30

// r.Area = 100;  // ❌ Error: no tiene setter</code></pre>
                <div class="callout callout--info"><strong>💡 Las propiedades calculadas son ideales para valores derivados de otros datos. Siempre están actualizadas.</strong></div>`
            },
            {
                title: "Propiedades con expresión corporal",
                content: `<h2>Sintaxis compacta (expression-bodied)</h2>
                <p>Desde C# 6, podemos usar <code>=></code> para propiedades de solo lectura:</p>
                <pre><code>public class Empleado
{
    public string Nombre { get; set; }
    public double SalarioBase { get; set; }
    public double Bono { get; set; }

    // Property expression-bodied
    public double SalarioTotal => SalarioBase + Bono;

    // También para métodos
    public void MostrarInfo() =>
        Console.WriteLine($"{Nombre}: ${SalarioTotal:F2}");
}

// Uso:
var emp = new Empleado
{
    Nombre = "Ana López",
    SalarioBase = 3000,
    Bono = 500
};

Console.WriteLine($"Total: {emp.SalarioTotal:C}");  // $3,500.00</code></pre>`
            },
            {
                title: "Propiedades init (C# 9+)",
                content: `<h2>Propiedades con init (C# 9+)</h2>
                <p><code>init</code> permite asignar valor <strong>solo durante la inicialización</strong> (constructor o inicializador de objetos).</p>
                <pre><code>public class Usuario
{
    public string Email { get; init; }
    public string nombre;
    public string nombreCompleto;

    public Usuario(string nombreCompleto)
    {
        this.nombreCompleto = nombreCompleto;
    }
}

// Uso:
var usuario = new Usuario("Ana López")
{
    Email = "ana@email.com"   // ✅ Init: permitido aquí
};

// usuario.Email = "otro@email.com";  // ❌ Error: propiedad init solo en inicialización</code></pre>
                <div class="callout callout--warning"><strong>⚠️ <code>init</code> es ideal para propiedades que no deben cambiar después de crear el objeto (inmutable).</strong></div>`
            },
            {
                title: "Buenas prácticas",
                content: `<h2>Buenas prácticas de encapsulamiento</h2>
                <table>
                    <tr><th>Práctica</th><th>✅ Correcto</th><th>❌ Incorrecto</th></tr>
                    <tr><td>Campos privados por defecto</td><td><code>private double saldo;</code></td><td><code>public double saldo;</code></td></tr>
                    <tr><td>Propiedades públicas</td><td><code>public double Saldo { get; }</code></td><td>Métodos GetSaldo() / SetSaldo() (Java style)</td></tr>
                    <tr><td>Validar en setters</td><td>if-else con value</td><td>Permitir cualquier valor</td></tr>
                    <tr><td>Propiedades auto-implementadas</td><td><code>{ get; set; }</code></td><td>Backing field manual innecesario</td></tr>
                    <tr><td>Usar init para datos inmutables</td><td><code>{ get; init; }</code></td><td>Setters públicos en datos que no cambian</td></tr>
                </table>
                <pre><code>// ✅ Diseño encapsulado moderno
public class Cliente
{
    public string Nombre { get; set; }
    public string Email { get; init; }
    public decimal Saldo { get; private set; }
}</code></pre>`
            },
            {
                title: "Ejemplo completo",
                content: `<h2>Ejemplo completo: Sistema de Cuentas</h2>
                <pre><code>public class CuentaBancaria
{
    public string Titular { get; init; }
    public string NumeroCuenta { get; }
    private decimal saldo;

    public decimal Saldo => saldo;

    public CuentaBancaria(string titular, string numeroCuenta, decimal depositoInicial = 0)
    {
        Titular = titular;
        NumeroCuenta = numeroCuenta;
        saldo = depositoInicial;
    }

    public void Depositar(decimal monto)
    {
        if (monto <= 0) throw new ArgumentException("El monto debe ser positivo");
        saldo += monto;
        Console.WriteLine($"Depósito: {monto:C}. Nuevo saldo: {saldo:C}");
    }

    public bool Retirar(decimal monto)
    {
        if (monto <= 0 || monto > saldo) return false;
        saldo -= monto;
        Console.WriteLine($"Retiro: {monto:C}. Nuevo saldo: {saldo:C}");
        return true;
    }

    public void MostrarInfo()
    {
        Console.WriteLine($"Titular: {Titular}");
        Console.WriteLine($"Cuenta: {NumeroCuenta}");
        Console.WriteLine($"Saldo: {Saldo:C}\n");
    }
}</code></pre>`
            },
            {
                title: "Resumen",
                content: `<h2>Resumen de la clase</h2>
                <div class="callout callout--success"><strong>✅ Al finalizar esta clase sabes:</strong></div>
                <ul>
                    <li>Qué es el encapsulamiento y por qué es importante</li>
                    <li>Modificadores de acceso: <code>public</code>, <code>private</code>, <code>protected</code>, <code>internal</code></li>
                    <li>Propiedades con <code>get</code> y <code>set</code></li>
                    <li>Propiedades auto-implementadas <code>{ get; set; }</code></li>
                    <li>Propiedades de solo lectura <code>{ get; }</code> y <code>init</code></li>
                    <li>Propiedades calculadas (sin backing field)</li>
                    <li>Expression-bodied members con <code>=></code></li>
                    <li>Validar datos antes de asignar</li>
                </ul>
                <p style="color:var(--green);font-size:1.1rem;margin-top:1rem;">¡Protege tus datos!</p>`
            }
        ];

        let current = 0;
        const slideEl = document.getElementById('slide');
        const counterEl = document.getElementById('counter');
        const tocEl = document.getElementById('toc');
        const dotsContainer = document.getElementById('dotsContainer');

        function renderSlide() {
            slideEl.innerHTML = slides[current].content;
            counterEl.textContent = `${current + 1} / ${slides.length}`;
            document.getElementById('prevBtn').disabled = current === 0;
            document.getElementById('nextBtn').disabled = current === slides.length - 1;
            document.querySelectorAll('.sidebar li').forEach((li, i) => li.classList.toggle('active', i === current));
            document.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === current));
        }

        function nextSlide() { if (current < slides.length - 1) { current++; renderSlide(); } }
        function prevSlide() { if (current > 0) { current--; renderSlide(); } }

        document.addEventListener('keydown', e => {
            if (e.key === 'ArrowRight') nextSlide();
            if (e.key === 'ArrowLeft') prevSlide();
        });

        slides.forEach((s, i) => {
            const li = document.createElement('li');
            li.textContent = s.title;
            li.onclick = () => { current = i; renderSlide(); };
            tocEl.appendChild(li);
            const dot = document.createElement('span');
            dot.className = 'dot';
            dot.onclick = () => { current = i; renderSlide(); };
            dotsContainer.appendChild(dot);
        });

        renderSlide();
    </script>
</body>
