    <script>
        const slides = [
            {
                title: "Portada",
                content: `<p class="eyebrow">Módulo 2 · Programación Orientada a Objetos</p>
                <h1>Clases, Objetos y Constructores</h1>
                <p class="subtitle">Da el salto de la programación procedural a la Orientada a Objetos. Aprende a modelar entidades del mundo real.</p>
                <p style="color:var(--text-muted);font-size:0.85rem;">Clase 06 · Diplomado Programación con .NET</p>
                <p><span class="tag">Clases</span> <span class="tag">Objetos</span> <span class="tag">Constructores</span> <span class="tag">POO</span></p>`
            },
            {
                title: "¿Qué es POO?",
                content: `<h2>Programación Orientada a Objetos</h2>
                <p>La <strong>POO</strong> (OOP en inglés) es un paradigma que organiza el código en torno a <strong>objetos</strong> que combinan datos y comportamiento.</p>
                <div class="comparison">
                    <div>
                        <h4>Programación procedural</h4>
                        <p>Datos y funciones separados. Todo en Program.cs.</p>
                        <code>string nombre = "Ana";<br>int edad = 25;<br>Saludar(nombre);</code>
                    </div>
                    <div>
                        <h4>POO</h4>
                        <p>Datos + métodos encapsulados en clases.</p>
                        <code>Persona p = new Persona();<br>p.Nombre = "Ana";<br>p.Saludar();</code>
                    </div>
                </div>
                <p>Pilares de la POO:</p>
                <ul>
                    <li><strong>Encapsulamiento</strong> — ocultar detalles internos</li>
                    <li><strong>Herencia</strong> — reutilizar código entre clases</li>
                    <li><strong>Polimorfismo</strong> — un mismo método, múltiples formas</li>
                    <li><strong>Abstracción</strong> — modelar solo lo relevante</li>
                </ul>`
            },
            {
                title: "Clases y objetos",
                content: `<h2>Clase vs Objeto</h2>
                <div class="comparison">
                    <div>
                        <h4>Clase</h4>
                        <p>Es el <strong>molde</strong> o plano. Define atributos y métodos.</p>
                        <code>class Persona {<br>    string Nombre;<br>    int Edad;<br>    void Saludar() {...}<br>}</code>
                    </div>
                    <div>
                        <h4>Objeto</h4>
                        <p>Es una <strong>instancia concreta</strong> del molde.</p>
                        <code>Persona p1 = new Persona();<br>p1.Nombre = "Ana";<br>p1.Saludar();<br><br>Persona p2 = new Persona();<br>p2.Nombre = "Luis";</code>
                    </div>
                </div>
                <p>La clase es el concepto universal; el objeto es la realización particular. <strong>De una clase podemos crear muchos objetos.</strong></p>
                <div class="callout callout--info"><strong>💡 Analogía:</strong> La clase es el molde de una galleta. El objeto es cada galleta que horneas con ese molde.</div>`
            },
            {
                title: "Crear una clase",
                content: `<h2>Definir una clase en C#</h2>
                <p>En un proyecto .NET, las clases suelen ir en archivos separados con el mismo nombre.</p>
                <h3>Persona.cs</h3>
                <pre><code>public class Persona
{
    // Atributos (campos)
    public string nombre;
    public int edad;
    public string ciudad;

    // Métodos
    public void Saludar()
    {
        Console.WriteLine($"Hola, soy {nombre} de {ciudad}");
    }

    public void CumplirAnios()
    {
        edad++;
        Console.WriteLine($"¡Feliz cumpleaños! Ahora tengo {edad} años.");
    }
}</code></pre>
                <div class="callout callout--success"><strong>💡 La palabra <code>public</code> significa que es accesible desde cualquier parte del programa.</strong></div>`
            },
            {
                title: "Usar la clase (Program.cs)",
                content: `<h2>Crear y usar objetos</h2>
                <pre><code>// Program.cs
Persona persona1 = new Persona();
persona1.nombre = "Ana";
persona1.edad = 25;
persona1.ciudad = "Madrid";
persona1.Saludar();
persona1.CumplirAnios();

Persona persona2 = new Persona();
persona2.nombre = "Carlos";
persona2.edad = 30;
persona2.ciudad = "México DF";
persona2.Saludar();

// Salida:
// Hola, soy Ana de Madrid
// ¡Feliz cumpleaños! Ahora tengo 26 años.
// Hola, soy Carlos de México DF</code></pre>
                <table>
                    <tr><th>Paso</th><th>Código</th><th>Explicación</th></tr>
                    <tr><td>1. Declarar variable</td><td><code>Persona p;</code></td><td>Tipo Persona</td></tr>
                    <tr><td>2. Crear instancia</td><td><code>new Persona()</code></td><td>Reserva memoria</td></tr>
                    <tr><td>3. Asignar valores</td><td><code>p.nombre = "Ana"</code></td><td>Modifica atributos</td></tr>
                    <tr><td>4. Llamar métodos</td><td><code>p.Saludar()</code></td><td>Ejecuta comportamiento</td></tr>
                </table>`
            },
            {
                title: "Constructores",
                content: `<h2>Constructores</h2>
                <p>Un <strong>constructor</strong> es un método especial que se ejecuta automáticamente al crear un objeto. Sirve para <strong>inicializar</strong> los atributos.</p>
                <pre><code>public class Persona
{
    public string nombre;
    public int edad;

    // Constructor (mismo nombre que la clase, sin tipo de retorno)
    public Persona(string nombreInicial, int edadInicial)
    {
        nombre = nombreInicial;
        edad = edadInicial;
        Console.WriteLine($"Persona creada: {nombre}");
    }
}

// Uso
Persona p = new Persona("Ana", 25);
// Salida: Persona creada: Ana</code></pre>
                <div class="callout callout--info"><strong>💡 El constructor se llama con <code>new</code>. Si no definimos ninguno, C# crea un constructor vacío automático.</strong></div>`
            },
            {
                title: "Sobrecarga de constructores",
                content: `<h2>Múltiples constructores (sobrecarga)</h2>
                <p>Podemos tener varios constructores con diferentes parámetros:</p>
                <pre><code>public class Producto
{
    public string nombre;
    public double precio;
    public int stock;

    // Constructor completo
    public Producto(string nombre, double precio, int stock)
    {
        this.nombre = nombre;
        this.precio = precio;
        this.stock = stock;
    }

    // Constructor con valores por defecto
    public Producto(string nombre, double precio)
        : this(nombre, precio, 0) { }

    // Constructor vacío (valores default)
    public Producto()
    {
        nombre = "Sin nombre";
        precio = 0;
        stock = 0;
    }
}</code></pre>
                <p>Uso:</p>
                <pre><code>Producto p1 = new Producto("Laptop", 999.99, 10);
Producto p2 = new Producto("Mouse", 25.50);     // stock = 0
Producto p3 = new Producto();                    // valores default</code></pre>`
            },
            {
                title: "this",
                content: `<h2>La palabra clave this</h2>
                <p><code>this</code> hace referencia al <strong>objeto actual</strong>. Se usa para distinguir entre parámetros y atributos con el mismo nombre.</p>
                <pre><code>public class Estudiante
{
    public string nombre;
    public int edad;

    // Sin this: nombres diferentes
    public Estudiante(string nombreInicial, int edadInicial)
    {
        nombre = nombreInicial;
        edad = edadInicial;
    }

    // Con this: mismo nombre, this aclara
    public Estudiante(string nombre, int edad)
    {
        this.nombre = nombre;  // this.nombre = atributo
        this.edad = edad;      // nombre = parámetro
    }

    public void Mostrar()
    {
        Console.WriteLine($"{this.nombre}, {this.edad} años");
        // this es opcional aquí (no hay ambigüedad)
    }
}</code></pre>`
            },
            {
                title: "Métodos de instancia",
                content: `<h2>Métodos que operan sobre objetos</h2>
                <pre><code>public class Rectangulo
{
    public double ancho;
    public double alto;

    public Rectangulo(double ancho, double alto)
    {
        this.ancho = ancho;
        this.alto = alto;
    }

    public double CalcularArea()
    {
        return ancho * alto;
    }

    public double CalcularPerimetro()
    {
        return 2 * (ancho + alto);
    }

    public void Escalar(double factor)
    {
        ancho *= factor;
        alto *= factor;
    }

    public void Mostrar()
    {
        Console.WriteLine($"Rectángulo: {ancho} x {alto}");
        Console.WriteLine($"Área: {CalcularArea():F2}");
        Console.WriteLine($"Perímetro: {CalcularPerimetro():F2}");
    }
}</code></pre>`
            },
            {
                title: "Buenas prácticas",
                content: `<h2>Buenas prácticas con clases</h2>
                <table>
                    <tr><th>Práctica</th><th>✅ Correcto</th><th>❌ Incorrecto</th></tr>
                    <tr><td>Nombres en PascalCase</td><td><code>class Persona</code></td><td><code>class persona</code></td></tr>
                    <tr><td>Un archivo por clase</td><td><code>Persona.cs</code>, <code>Producto.cs</code></td><td>Todas las clases en Program.cs</td></tr>
                    <tr><td>Constructores para inicializar</td><td><code>new Persona("Ana", 25)</code></td><td>Crear objeto vacío y asignar luego</td></tr>
                    <tr><td>Usar this cuando hay ambigüedad</td><td><code>this.nombre = nombre</code></td><td>Nombres diferentes innecesarios</td></tr>
                    <tr><td>Métodos con propósito claro</td><td><code>CalcularArea()</code></td><td><code>ProcesarDatos()</code></td></tr>
                </table>
                <pre><code>// ✅ Clase bien diseñada
public class Libro
{
    public string titulo;
    public string autor;
    public int año;

    public Libro(string titulo, string autor, int año)
    {
        this.titulo = titulo;
        this.autor = autor;
        this.año = año;
    }
}</code></pre>`
            },
            {
                title: "Ejemplo completo",
                content: `<h2>Ejemplo completo: Sistema de Biblioteca</h2>
                <pre><code>// Libro.cs
public class Libro
{
    public string titulo;
    public string autor;
    public string isbn;
    public bool prestado;

    public Libro(string titulo, string autor, string isbn)
    {
        this.titulo = titulo;
        this.autor = autor;
        this.isbn = isbn;
        this.prestado = false;
    }

    public void Prestar()
    {
        if (prestado)
            Console.WriteLine($"'{titulo}' ya está prestado.");
        else
        {
            prestado = true;
            Console.WriteLine($"'{titulo}' prestado con éxito.");
        }
    }

    public void Devolver()
    {
        if (!prestado)
            Console.WriteLine($"'{titulo}' no estaba prestado.");
        else
        {
            prestado = false;
            Console.WriteLine($"'{titulo}' devuelto con éxito.");
        }
    }

    public void MostrarInfo()
    {
        string estado = prestado ? "Prestado" : "Disponible";
        Console.WriteLine($"{titulo} - {autor} [{estado}]");
    }
}</code></pre>`
            },
            {
                title: "Resumen",
                content: `<h2>Resumen de la clase</h2>
                <div class="callout callout--success"><strong>✅ Al finalizar esta clase sabes:</strong></div>
                <ul>
                    <li>Qué es la POO y sus 4 pilares fundamentales</li>
                    <li>Diferencia entre clase (molde) y objeto (instancia)</li>
                    <li>Crear clases con atributos y métodos</li>
                    <li>Crear objetos con <code>new</code></li>
                    <li>Definir constructores con y sin parámetros</li>
                    <li>Sobrecargar constructores</li>
                    <li>Usar <code>this</code> para referenciar el objeto actual</li>
                </ul>
                <p style="margin-top:1rem;"><strong>Comandos clave para recordar:</strong></p>
                <pre><code>dotnet new console -n Biblioteca
cd Biblioteca
# Crear Libro.cs, editar Program.cs
dotnet run</code></pre>
                <p style="color:var(--green);font-size:1.1rem;margin-top:1rem;">¡A modelar objetos!</p>`
            }
        ];

        let current = 0;
        const slideEl = document.getElementById('slide');
        const counterEl = document.getElementById('counter');
        const tocEl = document.getElementById('toc');
        const dotsContainer = document.getElementById('dotsContainer');

        function renderSlide() {
            slideEl.innerHTML = slides[current].content;
            counterEl.textContent = `${current + 1} / ${slides.length}`;
            document.getElementById('prevBtn').disabled = current === 0;
            document.getElementById('nextBtn').disabled = current === slides.length - 1;
            document.querySelectorAll('.sidebar li').forEach((li, i) => li.classList.toggle('active', i === current));
            document.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === current));
        }

        function nextSlide() { if (current < slides.length - 1) { current++; renderSlide(); } }
        function prevSlide() { if (current > 0) { current--; renderSlide(); } }

        document.addEventListener('keydown', e => {
            if (e.key === 'ArrowRight') nextSlide();
            if (e.key === 'ArrowLeft') prevSlide();
        });

        slides.forEach((s, i) => {
            const li = document.createElement('li');
            li.textContent = s.title;
            li.onclick = () => { current = i; renderSlide(); };
            tocEl.appendChild(li);
            const dot = document.createElement('span');
            dot.className = 'dot';
            dot.onclick = () => { current = i; renderSlide(); };
            dotsContainer.appendChild(dot);
        });

        renderSlide();
    </script>
</body>
</html>
