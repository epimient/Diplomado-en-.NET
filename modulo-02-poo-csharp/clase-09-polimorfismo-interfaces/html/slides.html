                <p>El <strong>polimorfismo</strong> (muchas formas) permite que un mismo método se comporte de manera diferente según el objeto que lo invoque.</p>
                <p>Ya vimos una forma de polimorfismo con <code>virtual</code> / <code>override</code>. Ahora profundizaremos.</p>

                    <li><strong>Polimorfismo en tiempo de compilación</strong> — sobrecarga de métodos (mismo nombre, diferentes parámetros)</li>

                content: `<h2>Polimorfismo con clases</h2>
                <pre><code>public abstract class Figura
{
    public abstract double CalcularArea();
    public abstract void Dibujar();
}

public class Circulo : Figura
{
    public double Radio { get; set; }
    public Circulo(double radio) { Radio = radio; }
    
    public override double CalcularArea() => Math.PI * Radio * Radio;
    public override void Dibujar() => Console.WriteLine("⭕ Círculo");
}

public class Rectangulo : Figura
{
    public double Ancho { get; set; }
    public double Alto { get; set; }
    
    public Rectangulo(double ancho, double alto)
    {
        Ancho = ancho; Alto = alto;
    }
    
    public override double CalcularArea() => Ancho * Alto;
    public override void Dibujar() => Console.WriteLine("▬ Rectángulo");
}

// Uso polimórfico:
Figura[] figuras = new Figura[]
{
    new Circulo(5),
    new Rectangulo(4, 6)
};

foreach (Figura f in figuras)
{
    f.Dibujar();
    Console.WriteLine($"Área: {f.CalcularArea():F2}\n");
}</code></pre>`

                content: `<h2>Interfaces</h2>
                <p>Una <strong>interfaz</strong> es un <strong>contrato</strong> que define qué métodos y propiedades debe tener una clase, sin implementarlos.</p>
                <pre><code>// Definición de interfaz (contrato)
public interface IVolador
{
    void Volar();
    void Aterrizar();
}

// Implementación: la clase CUMPLE el contrato
public class Pajaro : IVolador
{
    public void Volar()
    {
        Console.WriteLine("El pájaro vuela batiendo alas...");
    }
    
    public void Aterrizar()
    {
        Console.WriteLine("El pájaro aterriza en una rama.");
    }
}

public class Avion : IVolador
{
    public void Volar()
    {
        Console.WriteLine("El avión vuela con motores...");
    }
    
    public void Aterrizar()
    {
        Console.WriteLine("El avión aterriza en la pista.");
    }
}</code></pre>`

                content: `<h2>Interfaz vs Clase abstracta</h2>
                <div class="comparison">
                    <div>
                        <h4>Interfaz</h4>
                        <p>Solo declaraciones (métodos, propiedades, eventos). Sin implementación.</p>
                        <code>interface IVolador {<br>    void Volar();<br>}</code>
                        <p>Una clase puede implementar <strong>varias</strong> interfaces.</p>
                    </div>
                    <div>
                        <h4>Clase abstracta</h4>
                        <p>Puede tener implementación parcial. Puede tener campos y constructores.</p>
                        <code>abstract class Animal {<br>    public void Dormir() {...}<br>    abstract void HacerSonido();<br>}</code>
                        <p>Una clase solo puede <strong>heredar de una</strong> clase abstracta.</p>
                    </div>
                </div>
                <table>
                    <tr><th>Característica</th><th>Interfaz</th><th>Clase abstracta</th></tr>
                    <tr><td>Implementación</td><td>No (solo declaración)</td><td>Sí (puede tener código)</td></tr>
                    <tr><td>Campos</td><td>No</td><td>Sí</td></tr>
                    <tr><td>Constructores</td><td>No</td><td>Sí</td></tr>
                    <tr><td>Herencia múltiple</td><td>Sí (varias interfaces)</td><td>No (solo una clase)</td></tr>
                    <tr><td>Uso típico</td><td>Contrato de capacidades</td><td>Base común con implementación</td></tr>
                </table>`

                <pre><code>public interface IImprimible
{
    void Imprimir();
}

public interface IGuardable
{
    void Guardar(string archivo);
    void Cargar(string archivo);
}

public class Documento : IImprimible, IGuardable
{
    public string Contenido { get; set; }
    
    public Documento(string contenido)
    {
        Contenido = contenido;
    }
    
    public void Imprimir()
    {
        Console.WriteLine($"Imprimiendo: {Contenido}");
    }
    
    public void Guardar(string archivo)
    {
        File.WriteAllText(archivo, Contenido);
        Console.WriteLine($"Guardado en {archivo}");
    }
    
    public void Cargar(string archivo)
    {
        Contenido = File.ReadAllText(archivo);
        Console.WriteLine($"Cargado desde {archivo}");
    }
}</code></pre>
                <div class="callout callout--success"><strong>💡 Una clase puede implementar múltiples interfaces separadas por coma.</strong></div>`

                <pre><code>public interface IEncendible
{
    void Encender();
    void Apagar();
}

public class Lampara : IEncendible
{
    public void Encender() => Console.WriteLine("💡 Luz encendida");
    public void Apagar() => Console.WriteLine("💡 Luz apagada");
}

public class Computadora : IEncendible
{
    public void Encender() => Console.WriteLine("🖥️ PC encendida");
    public void Apagar() => Console.WriteLine("🖥️ PC apagada");
}

// Método que acepta cualquier cosa encendible
void ProbarEncendido(IEncendible dispositivo)
{
    Console.WriteLine("Probando dispositivo...");
    dispositivo.Encender();
    Thread.Sleep(500);
    dispositivo.Apagar();
}

// Uso:
ProbarEncendido(new Lampara());
ProbarEncendido(new Computadora());</code></pre>`

                <table>
                    <tr><th>Interfaz</th><th>Propósito</th><th>Método clave</th></tr>
                    <tr><td><code>IComparable</code></td><td>Comparar objetos (ordenar)</td><td><code>CompareTo()</code></td></tr>
                    <tr><td><code>IEnumerable</code></td><td>Recorrer colecciones (foreach)</td><td><code>GetEnumerator()</code></td></tr>
                    <tr><td><code>IDisposable</code></td><td>Liberar recursos</td><td><code>Dispose()</code></td></tr>
                    <tr><td><code>ICloneable</code></td><td>Clonar objetos</td><td><code>Clone()</code></td></tr>
                    <tr><td><code>IComparer</code></td><td>Comparación personalizada</td><td><code>Compare()</code></td></tr>
                </table>
                <h3>Ejemplo: IComparable</h3>
                <pre><code>public class Persona : IComparable<Persona>
{
    public string Nombre { get; set; }
    public int Edad { get; set; }
    
    public int CompareTo(Persona? otra)
    {
        if (otra == null) return 1;
        return this.Edad.CompareTo(otra.Edad);
    }
}

// Uso:
List<Persona> personas = new List<Persona>
{
    new Persona { Nombre = "Ana", Edad = 25 },
    new Persona { Nombre = "Luis", Edad = 30 },
    new Persona { Nombre = "Eva", Edad = 22 }
};

personas.Sort();  // Ordena por edad gracias a IComparable</code></pre>`

                <p>Desde C# 8, las interfaces pueden tener implementación por defecto:</p>
                <pre><code>public interface ILogger
{
    void Log(string mensaje);
    
    // Implementación por defecto (C# 8+)
    void LogInfo(string mensaje)
    {
        Log($"[INFO] {mensaje}");
    }
    
    void LogError(string mensaje)
    {
        Log($"[ERROR] {mensaje}");
    }
}

public class ConsolaLogger : ILogger
{
    public void Log(string mensaje)
    {
        Console.WriteLine($"{DateTime.Now:HH:mm:ss} {mensaje}");
    }
    // LogInfo y LogError vienen por defecto
}

// Uso:
ILogger logger = new ConsolaLogger();
logger.LogInfo("Iniciando aplicación...");
logger.LogError("Error al conectar");</code></pre>

                <pre><code>class SistemaNotificaciones
{
    private List<INotificable> canales;

    public SistemaNotificaciones()
    {
        canales = new List<INotificable>();
    }

    public void AgregarCanal(INotificable canal)
    {
        canales.Add(canal);
    }

    public void NotificarTodos(string mensaje)
    {
        Console.WriteLine($"\n=== Notificando: {mensaje} ===\n");
        foreach (var canal in canales)
        {
            canal.Enviar(mensaje);
        }
        Console.WriteLine("=== Notificación completada ===\n");
    }
}

        let current = 0;
        const slideEl = document.getElementById('slide');
        const counterEl = document.getElementById('counter');
        const tocEl = document.getElementById('toc');
        const dotsContainer = document.getElementById('dotsContainer');

        function renderSlide() {
            slideEl.innerHTML = slides[current].content;
            counterEl.textContent = `${current + 1} / ${slides.length}`;
            document.getElementById('prevBtn').disabled = current === 0;
            document.getElementById('nextBtn').disabled = current === slides.length - 1;
            document.querySelectorAll('.sidebar li').forEach((li, i) => li.classList.toggle('active', i === current));
            document.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === current));
        }

        function nextSlide() { if (current < slides.length - 1) { current++; renderSlide(); } }
        function prevSlide() { if (current > 0) { current--; renderSlide(); } }

        document.addEventListener('keydown', e => {
            if (e.key === 'ArrowRight') nextSlide();
            if (e.key === 'ArrowLeft') prevSlide();
        });

        slides.forEach((s, i) => {
            const li = document.createElement('li');
            li.textContent = s.title;
            li.onclick = () => { current = i; renderSlide(); };
            tocEl.appendChild(li);
            const dot = document.createElement('span');
            dot.className = 'dot';
            dot.onclick = () => { current = i; renderSlide(); };
            dotsContainer.appendChild(dot);
        });

        renderSlide();
