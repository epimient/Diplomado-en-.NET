                <pre><code>[ApiController]
[Route("api/[controller]")]
public class ProductosController : ControllerBase

    private readonly AppDbContext _context;

    public ProductosController(AppDbContext context)

        _context = context;

        var productos = await _context.Productos

                Id = p.Id,
                Nombre = p.Nombre,
                Precio = p.Precio,
                Categoria = p.Categoria.Nombre
            })
            .ToListAsync();

        return Ok(productos);
    }

    [HttpGet("{id}")]
    public async Task&lt;ActionResult&lt;ProductoDto&gt;&gt; GetById(int id)

        var producto = await _context.Productos
            .Include(p => p.Categoria)
            .Where(p => p.Id == id)

            {
                Id = p.Id,
                Nombre = p.Nombre,
                Precio = p.Precio,
                Categoria = p.Categoria.Nombre
            })
            .FirstOrDefaultAsync();

        if (producto is null)
            return NotFound(new { error = "Producto no encontrado" });

        return Ok(producto);
    }

                <pre><code>// DTO de entrada
public class CrearProductoRequest
{
    [Required(ErrorMessage = "El nombre es obligatorio")]
    [StringLength(100)]
    public string Nombre { get; set; }

    [Required]
    [StringLength(500)]
    public string Descripcion { get; set; }

    [Required]
    [Range(0.01, 999999.99)]
    public decimal Precio { get; set; }

    [Range(0, 10000)]
    public int Stock { get; set; }

    [Required]
    public int CategoriaId { get; set; }
}

// POST api/productos
[HttpPost]
public async Task&lt;ActionResult&lt;ProductoDto&gt;&gt; Create(
    CrearProductoRequest request)
{
    var categoria = await _context.Categorias
        .FindAsync(request.CategoriaId);

    if (categoria is null)
        return BadRequest(new { error = "Categoria no encontrada" });

    var producto = new Producto
    {
        Nombre = request.Nombre,
        Descripcion = request.Descripcion,
        Precio = request.Precio,
        Stock = request.Stock,
        CategoriaId = request.CategoriaId
    };

    _context.Productos.Add(producto);
    await _context.SaveChangesAsync();

    var dto = new ProductoDto
    {
        Id = producto.Id,
        Nombre = producto.Nombre,
        Precio = producto.Precio,
        Stock = producto.Stock,
        Categoria = categoria.Nombre
    };

    return CreatedAtAction(nameof(GetById),
        new { id = producto.Id }, dto);
}</code></pre>`

                <pre><code>// DTO para actualizar
public class ActualizarProductoRequest
{
    [Required]
    [StringLength(100)]
    public string Nombre { get; set; }

    [StringLength(500)]
    public string Descripcion { get; set; }

    [Required]
    [Range(0.01, 999999.99)]
    public decimal Precio { get; set; }

    [Range(0, 10000)]
    public int Stock { get; set; }

    [Required]
    public int CategoriaId { get; set; }
}

// PUT api/productos/5
[HttpPut("{id}")]
public async Task&lt;IActionResult&gt; Update(int id,
    ActualizarProductoRequest request)
{
    var producto = await _context.Productos.FindAsync(id);
    if (producto is null)
        return NotFound(new { error = "Producto no encontrado" });

    var categoria = await _context.Categorias
        .FindAsync(request.CategoriaId);
    if (categoria is null)
        return BadRequest(new { error = "Categoria no encontrada" });

    producto.Nombre = request.Nombre;
    producto.Descripcion = request.Descripcion;
    producto.Precio = request.Precio;
    producto.Stock = request.Stock;
    producto.CategoriaId = request.CategoriaId;

    await _context.SaveChangesAsync();
    return NoContent();  // 204
}

// DELETE api/productos/5
[HttpDelete("{id}")]
public async Task&lt;IActionResult&gt; Delete(int id)
{
    var producto = await _context.Productos.FindAsync(id);
    if (producto is null)
        return NotFound(new { error = "Producto no encontrado" });

    _context.Productos.Remove(producto);
    await _context.SaveChangesAsync();
    return NoContent();  // 204
}</code></pre>`

if (app.Environment.IsDevelopment())
{

    app.UseSwaggerUI(c =>

        c.RoutePrefix = "swagger";
    });
}

app.Run();</code></pre>

                <pre><code>// ──── Models ────
public class Producto
{
    public int Id { get; set; }
    public string Nombre { get; set; }
    public string Descripcion { get; set; }
    public decimal Precio { get; set; }
    public int Stock { get; set; }
    public int CategoriaId { get; set; }
    public Categoria Categoria { get; set; }
    public DateTime FechaCreacion { get; set; }
}

public class Categoria
{
    public int Id { get; set; }
    public string Nombre { get; set; }
    public List&lt;Producto&gt; Productos { get; set; } = new();
}

// ──── DbContext ────
public class AppDbContext : DbContext
{
    public AppDbContext(DbContextOptions&lt;AppDbContext&gt; o) : base(o) { }
    public DbSet&lt;Producto&gt; Productos { get; set; }
    public DbSet&lt;Categoria&gt; Categorias { get; set; }
}

// ──── DTOs ────
public record ProductoDto(
    int Id, string Nombre, decimal Precio,
    int Stock, string Categoria);

public record CrearProductoRequest(
    [Required] string Nombre,
    string Descripcion,
    [Range(0.01, 999999)] decimal Precio,
    int Stock,
    [Required] int CategoriaId);

// ──── Controller ────
[ApiController]
[Route("api/[controller]")]
[Produces("application/json")]
public class ProductosController : ControllerBase
{
    private readonly AppDbContext _db;
    public ProductosController(AppDbContext db) => _db = db;

    [HttpGet]
    [ProducesResponseType(typeof(List&lt;ProductoDto&gt;), 200)]
    public async Task&lt;ActionResult&lt;List&lt;ProductoDto&gt;&gt;&gt; GetAll()
    {
        var lista = await _db.Productos
            .Include(p => p.Categoria)
            .Select(p => new ProductoDto(
                p.Id, p.Nombre, p.Precio,
                p.Stock, p.Categoria.Nombre))
            .ToListAsync();
        return Ok(lista);
    }

    [HttpGet("{id}")]
    [ProducesResponseType(typeof(ProductoDto), 200)]
    [ProducesResponseType(404)]
    public async Task&lt;ActionResult&lt;ProductoDto&gt;&gt; Get(int id)
    {
        var p = await _db.Productos
            .Include(x => x.Categoria)
            .FirstOrDefaultAsync(x => x.Id == id);
        if (p is null) return NotFound();
        return Ok(new ProductoDto(
            p.Id, p.Nombre, p.Precio,
            p.Stock, p.Categoria.Nombre));
    }

    [HttpPost]
    [ProducesResponseType(typeof(ProductoDto), 201)]
    [ProducesResponseType(400)]
    public async Task&lt;ActionResult&lt;ProductoDto&gt;&gt; Post(
        CrearProductoRequest req)
    {
        var cat = await _db.Categorias.FindAsync(req.CategoriaId);
        if (cat is null) return BadRequest();

        var prod = new Producto
        {
            Nombre = req.Nombre,
            Descripcion = req.Descripcion,
            Precio = req.Precio,
            Stock = req.Stock,
            CategoriaId = req.CategoriaId,
            FechaCreacion = DateTime.UtcNow
        };
        _db.Productos.Add(prod);
        await _db.SaveChangesAsync();

        return CreatedAtAction(nameof(Get),
            new { id = prod.Id },
            new ProductoDto(prod.Id, prod.Nombre, prod.Precio,
                prod.Stock, cat.Nombre));
    }

    [HttpPut("{id}")]
    [ProducesResponseType(204)]
    [ProducesResponseType(404)]
    public async Task&lt;IActionResult&gt; Put(int id, CrearProductoRequest req)
    {
        var prod = await _db.Productos.FindAsync(id);
        if (prod is null) return NotFound();

        var cat = await _db.Categorias.FindAsync(req.CategoriaId);
        if (cat is null) return BadRequest();

        prod.Nombre = req.Nombre;
        prod.Descripcion = req.Descripcion;
        prod.Precio = req.Precio;
        prod.Stock = req.Stock;
        prod.CategoriaId = req.CategoriaId;
        await _db.SaveChangesAsync();
        return NoContent();
    }

    [HttpDelete("{id}")]
    [ProducesResponseType(204)]
    [ProducesResponseType(404)]
    public async Task&lt;IActionResult&gt; Delete(int id)
    {
        var prod = await _db.Productos.FindAsync(id);
        if (prod is null) return NotFound();
        _db.Productos.Remove(prod);
        await _db.SaveChangesAsync();
        return NoContent();
    }

        let current = 0;
        const slideEl = document.getElementById('slide');
        const counterEl = document.getElementById('counter');
        const tocEl = document.getElementById('toc');
        const dotsContainer = document.getElementById('dotsContainer');

        function renderSlide() {
            slideEl.innerHTML = slides[current].content;
            counterEl.textContent = `${current + 1} / ${slides.length}`;
            document.getElementById('prevBtn').disabled = current === 0;
            document.getElementById('nextBtn').disabled = current === slides.length - 1;
            document.querySelectorAll('.sidebar li').forEach((li, i) => li.classList.toggle('active', i === current));
            document.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === current));
        }

        function nextSlide() { if (current < slides.length - 1) { current++; renderSlide(); } }
        function prevSlide() { if (current > 0) { current--; renderSlide(); } }

        document.addEventListener('keydown', e => {
            if (e.key === 'ArrowRight') nextSlide();
            if (e.key === 'ArrowLeft') prevSlide();
        });

        slides.forEach((s, i) => {
            const li = document.createElement('li');
            li.textContent = s.title;
            li.onclick = () => { current = i; renderSlide(); };
            tocEl.appendChild(li);
            const dot = document.createElement('span');
            dot.className = 'dot';
            dot.onclick = () => { current = i; renderSlide(); };
            dotsContainer.appendChild(dot);
        });

        renderSlide();
    </script>
