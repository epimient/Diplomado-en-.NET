                <pre><code>// Modelo de dominio
public class Producto
{
    public int Id { get; set; }
    public string Nombre { get; set; }
    public string Descripcion { get; set; }
    public decimal Precio { get; set; }
    public int Stock { get; set; }
    public DateTime FechaCreacion { get; set; }

                <p>Un <strong>DTO</strong> es un objeto simple que se usa para transferir datos entre capas o entre el servidor y el cliente. No contiene lógica de negocio.</p>
                <pre><code>// DTO para crear un producto (entrada)
public class CrearProductoRequest
{
    public string Nombre { get; set; }
    public string Descripcion { get; set; }
    public decimal Precio { get; set; }
    public int Stock { get; set; }
}

// DTO para devolver un producto (salida)
public class ProductoResponse
{
    public int Id { get; set; }
    public string Nombre { get; set; }
    public decimal Precio { get; set; }
    public int Stock { get; set; }
    public string Categoria { get; set; }
}

// Uso en controlador
[HttpPost]
public ActionResult&lt;ProductoResponse&gt; Crear(CrearProductoRequest request)
{
    var producto = new Producto
    {
        Nombre = request.Nombre,
        Descripcion = request.Descripcion,
        Precio = request.Precio,
        Stock = request.Stock,
        FechaCreacion = DateTime.Now
    };

    // Guardar en BD...

    return CreatedAtAction(nameof(Get), new { id = producto.Id },
        new ProductoResponse
        {
            Id = producto.Id,
            Nombre = producto.Nombre,
            Precio = producto.Precio,
            Stock = producto.Stock
        });
}</code></pre>`

public IActionResult Crear(Producto p)

    // Recibe TODOS los campos

    _db.Productos.Add(p);
    _db.SaveChanges();
    return Ok(p);
}</code>
                        <p style="color:var(--red);">⚠️ Sobreexposición<br>⚠️ El cliente controla campos internos<br>⚠️ Acoplamiento total</p>

                    <div>
                        <h4>Con DTOs ✅</h4>
                        <code>[HttpPost]
public IActionResult Crear(
    CrearProductoRequest req)
{
    // Solo recibe lo necesario
    var p = new Producto
    {
        Nombre = req.Nombre,
        Precio = req.Precio

    };

}</code>

                content: `<h2>Data Annotations — [Required]</h2>
                <p>Las <strong>Data Annotations</strong> son atributos del espacio <code>System.ComponentModel.DataAnnotations</code> que permiten definir reglas de validación directamente sobre las propiedades del modelo.</p>
                <pre><code>using System.ComponentModel.DataAnnotations;

public class CrearProductoRequest
{
    [Required(ErrorMessage = "El nombre es obligatorio")]
    public string Nombre { get; set; }

    [Required]
    [StringLength(500, MinimumLength = 10,
        ErrorMessage = "La descripción debe tener entre 10 y 500 caracteres")]
    public string Descripcion { get; set; }
}

public class RegistrarUsuarioRequest
{
    [Required(ErrorMessage = "El correo es obligatorio")]
    [EmailAddress(ErrorMessage = "Formato de correo inválido")]
    public string Email { get; set; }

    [Required]
    [StringLength(100, MinimumLength = 6)]
    public string Password { get; set; }

    [Compare("Password", ErrorMessage = "Las contraseñas no coinciden")]
    public string ConfirmarPassword { get; set; }
}</code></pre>
                <div class="callout"><strong>💡 [Required] asegura que el valor no sea null. Para strings, también asegura que no esté vacío.</strong></div>`

            {

                content: `<h2>Más Data Annotations</h2>
                <table>
                    <tr><th>Atributo</th><th>Qué valida</th><th>Ejemplo</th></tr>
                    <tr><td><code>[StringLength(max)]</code></td><td>Longitud máxima de string</td><td><code>[StringLength(100)]</code></td></tr>
                    <tr><td><code>[StringLength(max, MinLength)]</code></td><td>Longitud min y max</td><td><code>[StringLength(500, MinLength = 10)]</code></td></tr>
                    <tr><td><code>[Range(min, max)]</code></td><td>Valor numérico en rango</td><td><code>[Range(0.01, 999999)]</code></td></tr>
                    <tr><td><code>[EmailAddress]</code></td><td>Formato de correo válido</td><td><code>[EmailAddress]</code></td></tr>
                    <tr><td><code>[Phone]</code></td><td>Formato de teléfono</td><td><code>[Phone]</code></td></tr>
                    <tr><td><code>[Url]</code></td><td>URL válida</td><td><code>[Url]</code></td></tr>
                    <tr><td><code>[RegularExpression(pattern)]</code></td><td>Patrón regex personalizado</td><td><code>[RegularExpression(@"^\d{3}-\d{4}$")]</code></td></tr>
                    <tr><td><code>[Compare]</code></td><td>Compara con otra propiedad</td><td><code>[Compare("Password")]</code></td></tr>

                <pre><code>public class ProductoRequest
{
    [Required]
    [StringLength(100)]
    public string Nombre { get; set; }

    [Required]
    [StringLength(2000, MinimumLength = 20)]

    public int Stock { get; set; }

    [EmailAddress]
    public string ProveedorEmail { get; set; }

    [Url]
    public string ImagenUrl { get; set; }
}</code></pre>`

                <p>Cuando usas <code>[ApiController]</code>, ASP.NET Core valida automáticamente el modelo antes de que el método se ejecute. Si hay errores, devuelve <strong>400 Bad Request</strong> con los detalles.</p>
                <pre><code>[ApiController]
[Route("api/[controller]")]
public class UsuariosController : ControllerBase
{
    [HttpPost]
    public IActionResult Crear(RegistrarUsuarioRequest request)
    {
        // Si el modelo no es válido, ASP.NET Core automáticamente
        // devuelve 400 Bad Request con los errores.
        // Este código SOLO se ejecuta si el modelo es válido.

        if (!ModelState.IsValid)
        {
            // Si necesitas validación adicional manual
            return BadRequest(ModelState);
        }

        // Procesar registro...
        return Ok(new { mensaje = "Usuario registrado" });
    }
}</code></pre>

public class ErrorResponse
{
    public int StatusCode { get; set; }
    public string Mensaje { get; set; }

// Uso en controlador
[HttpGet("{id}")]
public IActionResult Get(int id)

        return NotFound(new ErrorResponse
        {

            Mensaje = $"Producto con ID {id} no encontrado"
        });

    return Ok(producto);
}

// Middleware global para errores no controlados
app.UseExceptionHandler(errorApp =>
{
    errorApp.Run(async context =>
    {
        context.Response.StatusCode = 500;
        context.Response.ContentType = "application/json";

        {
            StatusCode = 500,
            Mensaje = "Error interno del servidor"
        });
    });
});</code></pre>

                <pre><code>// ──── Modelo ────
public class Usuario
{
    public int Id { get; set; }
    public string Nombre { get; set; }
    public string Email { get; set; }
    public string PasswordHash { get; set; }
    public DateTime FechaRegistro { get; set; }
}

// ──── DTOs ────
public class CrearUsuarioRequest
{
    [Required(ErrorMessage = "El nombre es obligatorio")]
    [StringLength(100, MinimumLength = 2)]
    public string Nombre { get; set; }

    [Required]
    [EmailAddress]
    public string Email { get; set; }

    [Required]
    [StringLength(50, MinimumLength = 6)]
    public string Password { get; set; }

    [Compare("Password")]
    public string ConfirmarPassword { get; set; }
}

public class UsuarioResponse
{
    public int Id { get; set; }
    public string Nombre { get; set; }
    public string Email { get; set; }
    public DateTime FechaRegistro { get; set; }
}

// ──── Controlador ────
[ApiController]
[Route("api/[controller]")]
public class UsuariosController : ControllerBase
{
    private static List&lt;Usuario&gt; _usuarios = new();
    private static int _nextId = 1;

    [HttpPost]
    public ActionResult&lt;UsuarioResponse&gt; Crear(CrearUsuarioRequest req)
    {
        var usuario = new Usuario
        {
            Id = _nextId++,
            Nombre = req.Nombre,
            Email = req.Email,
            PasswordHash = BCrypt.Net.BCrypt.HashPassword(req.Password),
            FechaRegistro = DateTime.UtcNow
        };

        _usuarios.Add(usuario);

        var response = new UsuarioResponse
        {
            Id = usuario.Id,
            Nombre = usuario.Nombre,
            Email = usuario.Email,
            FechaRegistro = usuario.FechaRegistro
        };

        return CreatedAtAction(nameof(Get), new { id = usuario.Id }, response);
    }

    [HttpGet("{id}")]
    public ActionResult&lt;UsuarioResponse&gt; Get(int id)
    {
        var u = _usuarios.FirstOrDefault(x => x.Id == id);
        if (u is null)
            return NotFound(new { error = "Usuario no encontrado" });

        return Ok(new UsuarioResponse
        {
            Id = u.Id, Nombre = u.Nombre,
            Email = u.Email, FechaRegistro = u.FechaRegistro
        });
    }
}</code></pre>`

            document.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === current));
        }

        function nextSlide() { if (current < slides.length - 1) { current++; renderSlide(); } }
        function prevSlide() { if (current > 0) { current--; renderSlide(); } }

        document.addEventListener('keydown', e => {
            if (e.key === 'ArrowRight') nextSlide();
            if (e.key === 'ArrowLeft') prevSlide();
        });

        slides.forEach((s, i) => {
            const li = document.createElement('li');
            li.textContent = s.title;
            li.onclick = () => { current = i; renderSlide(); };
            tocEl.appendChild(li);
            const dot = document.createElement('span');
            dot.className = 'dot';
            dot.onclick = () => { current = i; renderSlide(); };
            dotsContainer.appendChild(dot);
        });

        renderSlide();
    </script>
</body>
</html>
