GET /api/productos HTTP/1.1

                    <tr><td>Stateless</td><td>Cada petición es independiente. No hay estado del cliente en el servidor</td></tr>

                <p>Un controlador es una clase que agrupa endpoints relacionados. Hereda de <code>ControllerBase</code> y se decora con atributos.</p>
                <pre><code>using Microsoft.AspNetCore.Mvc;

[ApiController]                     // Habilita validación automática
[Route("api/[controller]")]         // Ruta base: api/productos
public class ProductosController : ControllerBase
{
    private static List<Producto> productos = new();

    [HttpGet]                       // GET api/productos
    public IActionResult Get()
    {
        return Ok(productos);
    }

    [HttpGet("{id}")]               // GET api/productos/1
    public IActionResult Get(int id)
    {
        var p = productos.FirstOrDefault(x => x.Id == id);
        if (p is null) return NotFound();
        return Ok(p);
    }
}</code></pre>
                <p>Cada método público es una <strong>acción</strong> que responde a una solicitud HTTP.</p>`

                <h3>[ApiController]</h3>
                <p>Habilita comportamientos automáticos:</p>
                <ul>
                    <li><strong>Validación automática</strong> del modelo (ModelState inválido → 400)</li>
                    <li><strong>Binding automático</strong> de parámetros desde el body</li>
                    <li><strong>Atributo [FromBody] implícito</strong> para tipos complejos</li>
                    <li>Error 400 con detalles automáticos</li>
                </ul>
                <pre><code>[ApiController]
[Route("api/[controller]")]
public class ProductosController : ControllerBase
{
    // Sin [ApiController] necesitarías:
    // public IActionResult Post([FromBody] Producto p)
    [HttpPost]
    public IActionResult Post(Producto p)  // [FromBody] implícito
    {
        // Si el modelo es inválido, automáticamente 400 Bad Request

public IActionResult Get()

    return Ok(productos);    // 200
}</code></pre>

public ActionResult&lt;Producto&gt; Get(int id)

                content: `<h2>Ejemplo: CRUD completo de productos</h2>
                <pre><code>[ApiController]
[Route("api/[controller]")]
public class ProductosController : ControllerBase
{
    private static List<Producto> _productos = new();
    private static int _nextId = 1;

    // GET api/productos
    [HttpGet]
    public ActionResult&lt;List&lt;Producto&gt;&gt; Get()
        => Ok(_productos);

    // GET api/productos/5
    [HttpGet("{id}")]
    public ActionResult&lt;Producto&gt; Get(int id)
    {
        var p = _productos.FirstOrDefault(x => x.Id == id);
        if (p is null) return NotFound(
            new { error = "Producto no encontrado" });
        return Ok(p);
    }

    // POST api/productos
    [HttpPost]
    public ActionResult&lt;Producto&gt; Post(Producto p)
    {
        p.Id = _nextId++;
        _productos.Add(p);
        return CreatedAtAction(nameof(Get), new { id = p.Id }, p);
    }

    // PUT api/productos/5
    [HttpPut("{id}")]
    public IActionResult Put(int id, Producto p)
    {
        var existente = _productos.FirstOrDefault(x => x.Id == id);
        if (existente is null) return NotFound();

        existente.Nombre = p.Nombre;
        existente.Precio = p.Precio;
        return NoContent();  // 204
    }

    // DELETE api/productos/5
    [HttpDelete("{id}")]
    public IActionResult Delete(int id)
    {
        var p = _productos.FirstOrDefault(x => x.Id == id);
        if (p is null) return NotFound();
        _productos.Remove(p);
        return NoContent();  // 204
    }
}</code></pre>`

        let current = 0;

        function renderSlide() {

            tocEl.appendChild(li);
            const dot = document.createElement('span');
            dot.className = 'dot';
            dot.onclick = () => { current = i; renderSlide(); };
            dotsContainer.appendChild(dot);
        });

        renderSlide();
    </script>
</body>
</html>
