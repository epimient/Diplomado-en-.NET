    public DbSet&lt;Producto&gt; Productos { get; set; }
    public DbSet&lt;Categoria&gt; Categorias { get; set; }
    public DbSet&lt;Usuario&gt; Usuarios { get; set; }

    public string Nombre { get; set; }
    public List&lt;Producto&gt; Productos { get; set; } = new();
}</code></pre>`

                <pre><code>public class ProductosController : ControllerBase
{
    private readonly AppDbContext _context;

    public ProductosController(AppDbContext context)
    {
        _context = context;
    }

    // CREATE
    [HttpPost]
    public async Task&lt;ActionResult&lt;Producto&gt;&gt; Crear(Producto p)
    {
        _context.Productos.Add(p);
        await _context.SaveChangesAsync();
        return CreatedAtAction(nameof(Get), new { id = p.Id }, p);
    }

    // READ (todos)
    [HttpGet]
    public async Task&lt;ActionResult&lt;List&lt;Producto&gt;&gt;&gt; Get()
    {
        return await _context.Productos.ToListAsync();
    }

    // READ (uno)
    [HttpGet("{id}")]
    public async Task&lt;ActionResult&lt;Producto&gt;&gt; Get(int id)
    {
        var p = await _context.Productos.FindAsync(id);
        if (p is null) return NotFound();
        return p;
    }

    // UPDATE
    [HttpPut("{id}")]
    public async Task&lt;IActionResult&gt; Update(int id, Producto p)
    {
        if (id != p.Id) return BadRequest();

        _context.Entry(p).State = EntityState.Modified;
        await _context.SaveChangesAsync();
        return NoContent();
    }

    // DELETE
    [HttpDelete("{id}")]
    public async Task&lt;IActionResult&gt; Delete(int id)
    {
        var p = await _context.Productos.FindAsync(id);
        if (p is null) return NotFound();

        _context.Productos.Remove(p);
        await _context.SaveChangesAsync();
        return NoContent();
    }
}</code></pre>`

                <pre><code>// Obtener productos con precio mayor a 100

    .OrderByDescending(p => p.Precio)

// Existencia

// Un Producto pertenece a una Categoria

public class Categoria

    public List&lt;Producto&gt; Productos { get; set; } = new();

public class Producto
{
    public int Id { get; set; }
    public string Nombre { get; set; }
    public decimal Precio { get; set; }
    public int CategoriaId { get; set; }       // FK

    // Propiedad de navegación: referencia
    public Categoria Categoria { get; set; }

    .ToListAsync();

        let current = 0;

            if (e.key === 'ArrowLeft') prevSlide();

            const li = document.createElement('li');
            li.textContent = s.title;
            li.onclick = () => { current = i; renderSlide(); };
            tocEl.appendChild(li);
            const dot = document.createElement('span');
            dot.className = 'dot';
            dot.onclick = () => { current = i; renderSlide(); };
            dotsContainer.appendChild(dot);
        });

        renderSlide();
    </script>
</body>
</html>
