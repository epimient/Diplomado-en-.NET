                <pre><code># GET - Obtener todos los libros
curl http://localhost:5000/api/libros

# GET - Obtener libro por ID
curl http://localhost:5000/api/libros/1

# GET con formato JSON legible
curl http://localhost:5000/api/libros | jq

# POST - Crear un libro
curl -X POST http://localhost:5000/api/libros \
  -H "Content-Type: application/json" \
  -d '{
    "titulo": "El principito",
    "isbn": "978-84-376-0494-7",
    "anioPublicacion": 1943,
    "autorIds": [1]
  }'

# PUT - Actualizar un libro
curl -X PUT http://localhost:5000/api/libros/1 \
  -H "Content-Type: application/json" \
  -d '{
    "titulo": "El principito (edición especial)",
    "isbn": "978-84-376-0494-7",
    "anioPublicacion": 1943,
    "disponible": true,
    "autorIds": [1]

# DELETE - Eliminar un libro
curl -X DELETE http://localhost:5000/api/libros/1

# Ver solo el código de respuesta
curl -s -o /dev/null -w "%{http_code}" http://localhost:5000/api/libros</code></pre>

            {
                title: "Resumen",
                content: `<h2>Resumen de la clase</h2>
                <div class="callout callout--success"><strong>✅ Al finalizar esta clase sabes:</strong></div>
                <ul>
                    <li>Probar endpoints desde Swagger UI</li>
                    <li>Usar Thunder Client para pruebas en VS Code</li>
                    <li>Probar la API con curl desde la terminal</li>
                    <li>Documentar todos los endpoints en una tabla</li>
                    <li>Escribir un README.md profesional</li>
                    <li>Tomar capturas de pantalla de las pruebas</li>
                    <li>Grabar un video demo de funcionamiento</li>
                    <li>Preparar todo para la presentación final</li>
                </ul>
                <div class="callout callout--success"><strong>📌 Próxima clase:</strong> Clase 20 — Presentación Final. ¡El gran cierre del diplomado!</div>
                <p style="color:var(--green);font-size:1.1rem;margin-top:1rem;">¡Todo listo para la presentación!</p>`
            }
        ];

        let current = 0;
        const slideEl = document.getElementById('slide');
        const counterEl = document.getElementById('counter');
        const tocEl = document.getElementById('toc');
        const dotsContainer = document.getElementById('dotsContainer');

        function renderSlide() {
            slideEl.innerHTML = slides[current].content;
            counterEl.textContent = `${current + 1} / ${slides.length}`;
            document.getElementById('prevBtn').disabled = current === 0;
            document.getElementById('nextBtn').disabled = current === slides.length - 1;
            document.querySelectorAll('.sidebar li').forEach((li, i) => li.classList.toggle('active', i === current));
            document.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === current));
        }

        function nextSlide() { if (current < slides.length - 1) { current++; renderSlide(); } }
        function prevSlide() { if (current > 0) { current--; renderSlide(); } }

        document.addEventListener('keydown', e => {
            if (e.key === 'ArrowRight') nextSlide();
            if (e.key === 'ArrowLeft') prevSlide();
        });

        slides.forEach((s, i) => {
            const li = document.createElement('li');
            li.textContent = s.title;
            li.onclick = () => { current = i; renderSlide(); };
            tocEl.appendChild(li);
            const dot = document.createElement('span');
            dot.className = 'dot';
            dot.onclick = () => { current = i; renderSlide(); };
            dotsContainer.appendChild(dot);
        });

        renderSlide();
    </script>
