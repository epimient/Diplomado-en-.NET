                <pre><code>using System.ComponentModel.DataAnnotations;
using System.ComponentModel.DataAnnotations.Schema;

public class Categoria
{
    [Key]
    public int Id { get; set; }

    [Required]
    [MaxLength(100)]
    public string Nombre { get; set; }

    public string Descripcion { get; set; }
}

public class Producto

    public string Nombre { get; set; }

    [Column(TypeName = "decimal(18,2)")]
    public decimal Precio { get; set; }

    [ForeignKey("Categoria")]
    public int CategoriaId { get; set; }
    public Categoria Categoria { get; set; }
}</code></pre>

                <p>La clase <code>DbContext</code> es el puente entre tus modelos C# y la base de datos.</p>
                <pre><code>using Microsoft.EntityFrameworkCore;

namespace MiProyecto.Api.Data;

public class AppDbContext : DbContext
{
    public AppDbContext(DbContextOptions&lt;AppDbContext&gt; options)
        : base(options) { }

    // DbSet por cada entidad que quieras persistir
    public DbSet&lt;Libro&gt; Libros { get; set; }
    public DbSet&lt;Autor&gt; Autores { get; set; }
    public DbSet&lt;Prestamo&gt; Prestamos { get; set; }

    protected override void OnModelCreating(ModelBuilder modelBuilder)
    {
        base.OnModelCreating(modelBuilder);

        // Configurar relación N:N manual (opcional)
        modelBuilder.Entity&lt;Libro&gt;()
            .HasMany(l =&gt; l.Autores)
            .WithMany(a =&gt; a.Libros);

        // Configurar precisión decimal
        modelBuilder.Entity&lt;Producto&gt;()
            .Property(p =&gt; p.Precio)
            .HasPrecision(18, 2);
    }
}</code></pre>
                <div class="callout callout--warning"><strong>⚠️ Importante:</strong> Cada <code>DbSet&lt;T&gt;</code> se convierte en una tabla. EF Core infiere el nombre de la tabla a partir del nombre del DbSet (pluralizado automáticamente).</div>`

                <pre><code>using Microsoft.EntityFrameworkCore;
using MiProyecto.Api.Data;

var builder = WebApplication.CreateBuilder(args);

// Agregar controladores
builder.Services.AddControllers();

// Configurar DbContext con SQLite
builder.Services.AddDbContext&lt;AppDbContext&gt;(options =&gt;
    options.UseSqlite(
        builder.Configuration.GetConnectionString("DefaultConnection")
    )
);

// Configurar Swagger
builder.Services.AddEndpointsApiExplorer();
builder.Services.AddSwaggerGen();

var app = builder.Build();

// Middleware pipeline
if (app.Environment.IsDevelopment())
{
    app.UseSwagger();
    app.UseSwaggerUI();
}

app.UseHttpsRedirection();
app.MapControllers();

app.Run();</code></pre>

}</code></pre>

                <pre><code># Instalar herramienta global (una sola vez)
dotnet tool install --global dotnet-ef

# Crear migración inicial
dotnet ef migrations add InitialCreate

# Esto genera:
# Migrations/
# ├── 20250101000000_InitialCreate.cs
# └── AppDbContextModelSnapshot.cs

# Aplicar migración a la BD
dotnet ef database update

# Ver SQL generado (sin aplicar)
dotnet ef migrations script

# Agregar otra migración (cuando cambies modelos)
dotnet ef migrations add AgregarCamposNuevos

# Revertir migración
dotnet ef migrations remove

# Ver lista de migraciones
dotnet ef migrations list</code></pre>

                    <tr><td>8</td><td>Código subido a GitHub</td><td>⬜ Pendiente</td></tr>
                </table>`
            },
            {
                title: "Resumen",
                content: `<h2>Resumen de la clase</h2>
                <div class="callout callout--success"><strong>✅ Al finalizar esta clase sabes:</strong></div>
                <ul>
                    <li>Modelar entidades como clases de C# con Data Annotations</li>
                    <li>Configurar relaciones 1:N y N:N con propiedades de navegación</li>
                    <li>Implementar DbContext y DbSet para cada entidad</li>
                    <li>Configurar SQLite como motor de base de datos</li>
                    <li>Crear y aplicar migraciones con <code>dotnet-ef</code></li>
                    <li>Poblar la base de datos con seed data inicial</li>
                    <li>Aplicar buenas prácticas de modelado</li>
                </ul>
                <div class="callout callout--success"><strong>📌 Próxima clase:</strong> Clase 18 — Desarrollo de la API. Implementa los controladores REST con CRUD completo.</div>
                <p style="color:var(--green);font-size:1.1rem;margin-top:1rem;">¡Tu base de datos está lista!</p>`
            }
        ];

        let current = 0;
        const slideEl = document.getElementById('slide');
        const counterEl = document.getElementById('counter');
        const tocEl = document.getElementById('toc');
        const dotsContainer = document.getElementById('dotsContainer');

        function renderSlide() {
            slideEl.innerHTML = slides[current].content;
            counterEl.textContent = `${current + 1} / ${slides.length}`;
            document.getElementById('prevBtn').disabled = current === 0;
            document.getElementById('nextBtn').disabled = current === slides.length - 1;
            document.querySelectorAll('.sidebar li').forEach((li, i) => li.classList.toggle('active', i === current));
            document.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === current));
        }

        function nextSlide() { if (current < slides.length - 1) { current++; renderSlide(); } }
        function prevSlide() { if (current > 0) { current--; renderSlide(); } }

        document.addEventListener('keydown', e => {
            if (e.key === 'ArrowRight') nextSlide();
            if (e.key === 'ArrowLeft') prevSlide();
        });

        slides.forEach((s, i) => {
            const li = document.createElement('li');
            li.textContent = s.title;
            li.onclick = () => { current = i; renderSlide(); };
            tocEl.appendChild(li);
            const dot = document.createElement('span');
            dot.className = 'dot';
            dot.onclick = () => { current = i; renderSlide(); };
            dotsContainer.appendChild(dot);
        });

        renderSlide();
    </script>
</body>
</html>
