                <p>Un controlador es una clase que maneja las peticiones HTTP y devuelve respuestas. Cada método público es un <strong>endpoint</strong>.</p>
                <pre><code>using Microsoft.AspNetCore.Mvc;
using MiProyecto.Api.Data;
using MiProyecto.Api.Models;

[ApiController]
[Route("api/[controller]")]
public class LibrosController : ControllerBase
{
    private readonly AppDbContext _context;

    public LibrosController(AppDbContext context)
    {
        _context = context;
    }

    [HttpGet]
    public ActionResult&lt;List&lt;Libro&gt;&gt; GetAll()
    {
        return _context.Libros.ToList();
    }

    [HttpGet("{id}")]
    public ActionResult&lt;Libro&gt; GetById(int id)
    {
        var libro = _context.Libros.Find(id);
        if (libro == null)
            return NotFound(new { mensaje = "Libro no encontrado" });
        return libro;
    }
}</code></pre>

                <pre><code>[ApiController]
[Route("api/[controller]")]
public class ProductosController : ControllerBase
{
    private readonly AppDbContext _context;

    public ProductosController(AppDbContext context)
    {
        _context = context;
    }

    // GET /api/productos
    [HttpGet]
    public ActionResult&lt;List&lt;ProductoDto&gt;&gt; GetAll()
    {
        var productos = _context.Productos
            .Include(p =&gt; p.Categoria)
            .Select(p =&gt; new ProductoDto
            {
                Id = p.Id,
                Nombre = p.Nombre,
                Precio = p.Precio,
                Stock = p.Stock,
                Categoria = p.Categoria.Nombre
            })
            .ToList();

        return Ok(productos);
    }

    // GET /api/productos/5
    [HttpGet("{id}")]
    public ActionResult&lt;ProductoDto&gt; GetById(int id)
    {
        var producto = _context.Productos
            .Include(p =&gt; p.Categoria)
            .FirstOrDefault(p =&gt; p.Id == id);

        if (producto == null)
            return NotFound(new { mensaje = "Producto no encontrado" });

        return Ok(MapToDto(producto));
    }

    // POST /api/productos
    [HttpPost]
    public ActionResult&lt;ProductoDto&gt; Create([FromBody] CrearProductoDto dto)
    {
        var categoria = _context.Categorias.Find(dto.CategoriaId);
        if (categoria == null)
            return BadRequest(new { mensaje = "La categoría no existe" });

        var producto = new Producto
        {
            Nombre = dto.Nombre,
            Precio = dto.Precio,
            Stock = dto.Stock,
            CategoriaId = dto.CategoriaId
        };

        _context.Productos.Add(producto);
        _context.SaveChanges();

        return CreatedAtAction(nameof(GetById),
            new { id = producto.Id },
            MapToDto(producto));
    }
}</code></pre>`

                <pre><code>    // PUT /api/productos/5
    [HttpPut("{id}")]
    public ActionResult Update(int id, [FromBody] ActualizarProductoDto dto)
    {
        var producto = _context.Productos.Find(id);
        if (producto == null)
            return NotFound(new { mensaje = "Producto no encontrado" });

        var categoria = _context.Categorias.Find(dto.CategoriaId);
        if (categoria == null)
            return BadRequest(new { mensaje = "La categoría no existe" });

        producto.Nombre = dto.Nombre;
        producto.Precio = dto.Precio;
        producto.Stock = dto.Stock;
        producto.CategoriaId = dto.CategoriaId;

        _context.SaveChanges();
        return NoContent();
    }

    // DELETE /api/productos/5
    [HttpDelete("{id}")]
    public ActionResult Delete(int id)
    {
        var producto = _context.Productos.Find(id);
        if (producto == null)
            return NotFound(new { mensaje = "Producto no encontrado" });

        _context.Productos.Remove(producto);
        _context.SaveChanges();
        return NoContent();
    }

    // Método auxiliar para mapear a DTO
    private static ProductoDto MapToDto(Producto p)
    {
        return new ProductoDto
        {
            Id = p.Id,
            Nombre = p.Nombre,
            Precio = p.Precio,
            Stock = p.Stock,
            Categoria = p.Categoria?.Nombre ?? ""
        };
    }
}</code></pre>

    public ActionResult&lt;AutorDto&gt; GetById(int id)
    {

            .Include(a =&gt; a.Libros)
            .FirstOrDefault(a =&gt; a.Id == id);

        if (autor == null)
            return NotFound(new { mensaje = "Autor no encontrado" });

        return Ok(new AutorDto
        {
            Id = autor.Id,
            Nombre = autor.Nombre,
            Nacionalidad = autor.Nacionalidad,
            FechaNacimiento = autor.FechaNacimiento,
            Libros = autor.Libros.Select(l =&gt; l.Titulo).ToList()
        });
    }

    [HttpPost]
    public ActionResult&lt;AutorDto&gt; Create([FromBody] CrearAutorDto dto)
    {
        var autor = new Autor
        {
            Nombre = dto.Nombre,
            Nacionalidad = dto.Nacionalidad,
            FechaNacimiento = dto.FechaNacimiento
        };

        _context.Autores.Add(autor);
        _context.SaveChanges();

        return CreatedAtAction(nameof(GetById), new { id = autor.Id }, MapToDto(autor));

        let current = 0;
        const slideEl = document.getElementById('slide');
        const counterEl = document.getElementById('counter');
        const tocEl = document.getElementById('toc');
        const dotsContainer = document.getElementById('dotsContainer');

        function renderSlide() {
            slideEl.innerHTML = slides[current].content;
            counterEl.textContent = `${current + 1} / ${slides.length}`;
            document.getElementById('prevBtn').disabled = current === 0;
            document.getElementById('nextBtn').disabled = current === slides.length - 1;
            document.querySelectorAll('.sidebar li').forEach((li, i) => li.classList.toggle('active', i === current));
            document.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === current));
        }

        function nextSlide() { if (current < slides.length - 1) { current++; renderSlide(); } }
        function prevSlide() { if (current > 0) { current--; renderSlide(); } }

        document.addEventListener('keydown', e => {
            if (e.key === 'ArrowRight') nextSlide();
            if (e.key === 'ArrowLeft') prevSlide();
        });

        slides.forEach((s, i) => {
            const li = document.createElement('li');
            li.textContent = s.title;
            li.onclick = () => { current = i; renderSlide(); };
            tocEl.appendChild(li);
            const dot = document.createElement('span');
            dot.className = 'dot';
            dot.onclick = () => { current = i; renderSlide(); };
            dotsContainer.appendChild(dot);
        });

        renderSlide();
    </script>
