<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clase 05 — Métodos y Reto Integrador</title>
    <style>
        :root { --bg-base: #1a1b2e; --bg-panel: #24283b; --bg-hover: #2f3346; --text: #c0caf5; --text-muted: #565f89; --cyan: #7dcfff; --blue: #7aa2f7; --purple: #9d7cd8; --green: #9ece6a; --orange: #ff9e64; --red: #f7768e; --border: #3b4261; --code-bg: #1f2335; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg-base); color: var(--text); font-family: 'Inter', system-ui, -apple-system, sans-serif; display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 260px; background: rgba(36,40,59,0.35); backdrop-filter: blur(14px); padding: 1.5rem; overflow-y: auto; border-right: 1px solid rgba(255,255,255,0.05); }
        .sidebar::-webkit-scrollbar { width: 6px; }
        .sidebar::-webkit-scrollbar-track { background: transparent; }
        .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        .sidebar h2 { color: var(--cyan); font-size: 0.78rem; text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 1rem; font-weight: 600; }
        .sidebar ul { list-style: none; }
        .sidebar li { padding: 0.45rem 0.75rem; margin-bottom: 0.2rem; border-radius: 6px; cursor: pointer; font-size: 0.85rem; transition: background 0.15s, color 0.15s; }
        .sidebar li:hover { background: var(--bg-hover); color: var(--blue); }
        .sidebar li.active { background: rgba(122,162,247,0.15); color: var(--blue); font-weight: 500; }
        .main { flex: 1; display: flex; flex-direction: column; }
        .toolbar { padding: 0.75rem 2rem; background: rgba(36,40,59,0.7); backdrop-filter: blur(8px); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05); min-height: 48px; }
        .toolbar h1 { font-size: 0.95rem; color: var(--cyan); font-weight: 600; }
        .toolbar .counter { color: var(--text-muted); font-size: 0.82rem; font-family: 'JetBrains Mono', monospace; }
        .slide-area { flex: 1; display: flex; align-items: center; justify-content: center; padding: 2rem; overflow-y: auto; scrollbar-gutter: stable; }
        .slide-area::-webkit-scrollbar { width: 6px; }
        .slide-area::-webkit-scrollbar-track { background: transparent; }
        .slide-area::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.25); border-radius: 3px; }
        .slide { max-width: 900px; width: 100%; animation: fadeSlide 0.3s ease; }
        @keyframes fadeSlide { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
        .slide h1 { font-size: 2.5rem; font-weight: 700; color: #fff; margin-bottom: 1rem; line-height: 1.1; }
        .slide h2 { font-size: 1.5rem; font-weight: 600; color: var(--cyan); margin-bottom: 1rem; line-height: 1.2; }
        .slide h3 { font-size: 1.05rem; font-weight: 600; color: var(--blue); margin-bottom: 0.6rem; }
        .slide p { font-size: 0.95rem; line-height: 1.7; margin-bottom: 0.75rem; }
        .slide ul, .slide ol { margin-bottom: 0.75rem; padding-left: 1.5rem; }
        .slide li { font-size: 0.95rem; line-height: 1.65; margin-bottom: 0.35rem; }
        .slide pre { background: var(--code-bg); padding: 0.85rem 1.1rem; border-radius: 8px; overflow-x: auto; margin-bottom: 0.75rem; border-left: 3px solid var(--blue); font-size: 0.85rem; line-height: 1.5; }
        .slide code { font-family: 'JetBrains Mono', 'Fira Code', monospace; font-size: 0.85rem; }
        .slide pre code { background: none; padding: 0; font-size: 0.85rem; }
        .slide table { width: 100%; border-collapse: collapse; margin-bottom: 0.75rem; font-size: 0.9rem; }
        .slide th, .slide td { padding: 0.55rem 0.85rem; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .slide th { color: var(--cyan); font-weight: 600; background: rgba(125,207,255,0.04); }
        .slide tr:last-child td { border-bottom: none; }
        .slide .eyebrow { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1.8px; color: var(--purple); margin-bottom: 0.5rem; }
        .slide .subtitle { font-size: 1.15rem; color: var(--text-muted); margin-bottom: 1rem; line-height: 1.5; }
        .slide .tag { display: inline-block; font-size: 0.72rem; padding: 0.2rem 0.55rem; border-radius: 4px; background: rgba(122,162,247,0.12); color: var(--blue); margin-right: 0.3rem; margin-bottom: 0.3rem; font-weight: 500; }
        .slide .callout { padding: 0.7rem 1rem; margin-bottom: 0.75rem; border-radius: 6px; border-left: 4px solid var(--blue); background: rgba(122,162,247,0.06); font-size: 0.88rem; line-height: 1.6; }
        .slide .callout--success { border-left-color: var(--green); background: rgba(158,206,106,0.06); }
        .slide .callout--warning { border-left-color: var(--orange); background: rgba(255,158,100,0.06); }
        .slide .callout--error { border-left-color: var(--red); background: rgba(247,118,142,0.06); }
        .slide .comparison { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; margin-bottom: 0.75rem; }
        .slide .comparison > div { padding: 0.75rem; border-radius: 8px; border: 1px solid rgba(255,255,255,0.06); background: rgba(255,255,255,0.02); }
        .slide .comparison > div:first-child { border-left: 3px solid var(--red); }
        .slide .comparison > div:last-child { border-left: 3px solid var(--green); }
        .slide .comparison h4 { font-size: 0.85rem; color: var(--text); margin-bottom: 0.4rem; }
        .slide .comparison p, .slide .comparison code { font-size: 0.82rem; }
        .nav-buttons { padding: 0.7rem 2rem; display: flex; gap: 0.75rem; justify-content: center; align-items: center; background: rgba(36,40,59,0.7); backdrop-filter: blur(8px); border-top: 1px solid rgba(255,255,255,0.05); }
        .nav-buttons button { background: var(--blue); color: #fff; border: none; padding: 0.5rem 1.25rem; border-radius: 6px; cursor: pointer; font-size: 0.85rem; font-weight: 500; transition: opacity 0.2s; }
        .nav-buttons button:hover { opacity: 0.85; }
        .nav-buttons button:disabled { opacity: 0.3; cursor: default; }
        .nav-buttons .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border); cursor: pointer; transition: background 0.2s; display: inline-block; margin: 0 0.2rem; }
        .nav-buttons .dot.active { background: var(--cyan); }
        @media (max-width: 768px) { .sidebar { width: 200px; padding: 1rem; } .slide { padding: 0.5rem; } .slide h1 { font-size: 1.8rem; } .slide h2 { font-size: 1.2rem; } .slide-area { padding: 1rem; } .comparison { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="sidebar"><h2>Clase 05</h2><ul id="toc"></ul></div>
    <div class="main">
        <div class="toolbar"><h1>Métodos y Reto Integrador</h1><span class="counter" id="counter">1 / 12</span></div>
        <div class="slide-area"><div class="slide" id="slide"></div></div>
        <div class="nav-buttons"><button id="prevBtn" onclick="prevSlide()">◀ Anterior</button><span id="dotsContainer"></span><button id="nextBtn" onclick="nextSlide()">Siguiente ▶</button></div>
    </div>
    <script>
        const slides = [
            {
                title: "Portada",
                content: `<p class="eyebrow">Módulo 1 · Fundamentos de C# y .NET</p>
                <h1>Métodos y Reto Integrador</h1>
                <p class="subtitle">Aprende a organizar tu código en métodos reutilizables y completa tu primera aplicación funcional.</p>
                <p style="color:var(--text-muted);font-size:0.85rem;">Clase 05 · Diplomado Programación con .NET</p>
                <p><span class="tag">Métodos</span> <span class="tag">Parámetros</span> <span class="tag">Return</span> <span class="tag">Reto</span></p>`
            },
            {
                title: "¿Qué es un método?",
                content: `<h2>¿Qué es un método?</h2>
                <p>Un <strong>método</strong> (o función) es un bloque de código con nombre que podemos ejecutar cuando lo necesitemos.</p>
                <p>Piensa en un método como una <strong>receta de cocina</strong>:</p>
                <ul>
                    <li>Tiene un nombre (ej: "HacerTorta")</li>
                    <li>Recibe ingredientes (parámetros)</li>
                    <li>Sigue pasos (cuerpo del método)</li>
                    <li>Devuelve un resultado (el pastel)</li>
                </ul>
                <h3>Ventajas de usar métodos</h3>
                <ul>
                    <li><strong>Reutilización</strong> — escribes una vez, usas muchas</li>
                    <li><strong>Organización</strong> — código separado por responsabilidad</li>
                    <li><strong>Legibilidad</strong> — nombres descriptivos que explican qué hace cada parte</li>
                    <li><strong>Mantenibilidad</strong> — cambios localizados, no afectan todo el programa</li>
                </ul>`
            },
            {
                title: "Sintaxis de métodos",
                content: `<h2>Sintaxis básica</h2>
                <pre><code>// Método sin parámetros, sin retorno
void Saludar()
{
    Console.WriteLine("¡Hola!");
}

// Método con parámetros, sin retorno
void SaludarNombre(string nombre)
{
    Console.WriteLine($"¡Hola, {nombre}!");
}

// Método con parámetros y retorno
int Sumar(int a, int b)
{
    return a + b;
}</code></pre>
                <p>Estructura general:</p>
                <pre><code>tipoDeRetorno NombreDelMetodo(tipo parametro1, tipo parametro2)
{
    // Cuerpo del método
    return valor;  // Opcional (solo si no es void)
}</code></pre>
                <table>
                    <tr><th>Parte</th><th>Significado</th></tr>
                    <tr><td><code>void</code></td><td>No devuelve valor</td></tr>
                    <tr><td><code>int</code>, <code>string</code>, etc.</td><td>Tipo del valor que devuelve</td></tr>
                    <tr><td><code>return</code></td><td>Devuelve un valor y sale del método</td></tr>
                </table>`
            },
            {
                title: "Llamar a un método",
                content: `<h2>Cómo usar (invocar) un método</h2>
                <pre><code>// Definición
void MostrarMenu()
{
    Console.WriteLine("1. Sumar");
    Console.WriteLine("2. Restar");
    Console.WriteLine("3. Salir");
}

int Sumar(int a, int b)
{
    return a + b;
}

// Uso (invocación) desde Main
MostrarMenu();  // No necesita variable, es void

int resultado = Sumar(10, 5);  // Guardamos el retorno
Console.WriteLine($"10 + 5 = {resultado}");

// También podemos usar el retorno directamente
Console.WriteLine($"3 + 7 = {Sumar(3, 7)}");</code></pre>
                <div class="callout callout--info"><strong>💡 Orden de ejecución:</strong> Cuando llamas a un método, el programa salta a él, ejecuta su código y vuelve al punto donde lo llamaste.</div>`
            },
            {
                title: "Parámetros y argumentos",
                content: `<h2>Parámetros vs Argumentos</h2>
                <div class="comparison">
                    <div>
                        <h4>Parámetros</h4>
                        <p>Son las <strong>variables que recibe</strong> el método (en la definición).</p>
                        <code>void Saludar(string nombre)</code>
                    </div>
                    <div>
                        <h4>Argumentos</h4>
                        <p>Son los <strong>valores reales</strong> que pasamos al invocar.</p>
                        <code>Saludar("Ana");</code>
                    </div>
                </div>
                <h3>Parámetros con valor por defecto</h3>
                <pre><code>void Saludar(string nombre = "Invitado")
{
    Console.WriteLine($"Hola, {nombre}");
}

Saludar();           // "Hola, Invitado"
Saludar("Carlos");   // "Hola, Carlos"</code></pre>
                <h3>Múltiples parámetros</h3>
                <pre><code>double CalcularIMC(double peso, double altura)
{
    return peso / (altura * altura);
}

double imc = CalcularIMC(68.5, 1.75);  // Orden importa</code></pre>`
            },
            {
                title: "Return y void",
                content: `<h2>Return y void</h2>
                <h3>Métodos que devuelven valor</h3>
                <pre><code>int ObtenerMaximo(int a, int b, int c)
{
    int max = a;
    if (b > max) max = b;
    if (c > max) max = c;
    return max;
}

int maximo = ObtenerMaximo(10, 25, 7);
Console.WriteLine($"El máximo es {maximo}");  // 25</code></pre>
                <h3>Métodos void (no devuelven nada)</h3>
                <pre><code>void MostrarResultado(string operacion, double valor)
{
    Console.WriteLine($"Resultado de {operacion}: {valor:F2}");
    // No hay return
}</code></pre>
                <div class="callout callout--success"><strong>💡 <code>return</code> también sale del método inmediatamente.</strong> Puedes tener múltiples return en un método.</div>`
            },
            {
                title: "Ámbito de variables",
                content: `<h2>Ámbito (scope) de variables</h2>
                <p>Las variables declaradas dentro de un método <strong>solo existen ahí</strong>.</p>
                <pre><code>void MetodoA()
{
    int x = 10;
    Console.WriteLine(x);  // ✅ Accesible aquí
}

void MetodoB()
{
    // Console.WriteLine(x);  // ❌ Error: 'x' no existe aquí
    int y = 20;
}

// Console.WriteLine(y);  // ❌ Error: 'y' no existe aquí

int global = 100;  // Variable de nivel superior

void MostrarGlobal()
{
    Console.WriteLine(global);  // ✅ Accesible (nivel superior)
}</code></pre>
                <div class="callout callout--warning"><strong>⚠️ Regla general:</strong> Una variable solo es visible dentro del bloque <code>{}</code> donde fue declarada.</div>`
            },
            {
                title: "Métodos con lógica compleja",
                content: `<h2>Combinando métodos</h2>
                <pre><code>bool EsPar(int numero)
{
    return numero % 2 == 0;
}

string ClasificarNumero(int n)
{
    if (EsPar(n))
        return $"{n} es par";
    else
        return $"{n} es impar";
}

void MostrarClasificacion(int n)
{
    Console.WriteLine(ClasificarNumero(n));
}

// Programa principal
Console.WriteLine("=== CLASIFICADOR ===");
for (int i = 1; i <= 10; i++)
{
    MostrarClasificacion(i);
}</code></pre>
                <p>Salida:</p>
                <pre><code>=== CLASIFICADOR ===
1 es impar
2 es par
3 es impar
4 es par
5 es impar
6 es par
7 es impar
8 es par
9 es impar
10 es par</code></pre>`
            },
            {
                title: "Buenas prácticas",
                content: `<h2>Buenas prácticas con métodos</h2>
                <table>
                    <tr><th>Práctica</th><th>✅ Correcto</th><th>❌ Incorrecto</th></tr>
                    <tr><td>Nombres en PascalCase</td><td><code>CalcularPromedio()</code></td><td><code>calcular_promedio()</code></td></tr>
                    <tr><td>Un método, una responsabilidad</td><td><code>ValidarEmail()</code></td><td>Método que valida y envía y guarda</td></tr>
                    <tr><td>Nombre descriptivo (verbo + sustantivo)</td><td><code>ObtenerUsuario()</code></td><td><code>HacerCosas()</code></td></tr>
                    <tr><td>Pocos parámetros</td><td>2-3 parámetros</td><td>8+ parámetros</td></tr>
                    <tr><td>Evitar efectos secundarios</td><td>Solo hace lo que promete</td><td>Modifica variables globales</td></tr>
                </table>
                <pre><code>// ✅ Método con propósito claro
double CalcularAreaTriangulo(double base, double altura)
{
    return (base * altura) / 2;
}

// ❌ Método que hace de todo
void Procesar(string dato)
{
    // Validar, guardar, enviar email, generar PDF...
}</code></pre>`
            },
            {
                title: "Reto integrador",
                content: `<h2>Reto: Calculadora Modular</h2>
                <p>Vamos a crear una <strong>calculadora con menú</strong> usando métodos:</p>
                <pre><code>double Sumar(double a, double b) => a + b;
double Restar(double a, double b) => a - b;
double Multiplicar(double a, double b) => a * b;

double Dividir(double a, double b)
{
    if (b == 0)
    {
        Console.WriteLine("❌ Error: división entre cero");
        return 0;
    }
    return a / b;
}

double LeerNumero(string mensaje)
{
    Console.Write(mensaje);
    return double.Parse(Console.ReadLine());
}

void MostrarMenu()
{
    Console.WriteLine("\n=== CALCULADORA ===");
    Console.WriteLine("1. Sumar");
    Console.WriteLine("2. Restar");
    Console.WriteLine("3. Multiplicar");
    Console.WriteLine("4. Dividir");
    Console.WriteLine("5. Salir");
}</code></pre>`
            },
            {
                title: "Calculadora completa",
                content: `<h2>Programa principal de la calculadora</h2>
                <pre><code>do
{
    MostrarMenu();
    Console.Write("Elige una opción: ");
    string opcion = Console.ReadLine();

    if (opcion == "5")
    {
        Console.WriteLine("¡Hasta luego!");
        break;
    }

    double a = LeerNumero("Ingresa el primer número: ");
    double b = LeerNumero("Ingresa el segundo número: ");

    double resultado = 0;
    string operacion = "";

    switch (opcion)
    {
        case "1":
            resultado = Sumar(a, b);
            operacion = "suma";
            break;
        case "2":
            resultado = Restar(a, b);
            operacion = "resta";
            break;
        case "3":
            resultado = Multiplicar(a, b);
            operacion = "multiplicación";
            break;
        case "4":
            resultado = Dividir(a, b);
            operacion = "división";
            break;
        default:
            Console.WriteLine("Opción inválida.");
            continue;
    }

    Console.WriteLine($"Resultado de la {operacion}: {resultado:F2}");

} while (true);</code></pre>
                <div class="callout callout--success"><strong>✅ Este es tu primer programa modular.</strong> Cada operación está encapsulada en un método independiente.</div>`
            },
            {
                title: "Resumen",
                content: `<h2>Resumen de la clase</h2>
                <div class="callout callout--success"><strong>✅ Al finalizar esta clase sabes:</strong></div>
                <ul>
                    <li>Crear métodos con <code>void</code> y con retorno</li>
                    <li>Pasar parámetros y usar valores por defecto</li>
                    <li>La diferencia entre parámetros y argumentos</li>
                    <li>El ámbito (scope) de las variables</li>
                    <li>Componer métodos para crear programas modulares</li>
                    <li>Completaste tu reto integrador: Calculadora Modular</li>
                </ul>
                <p style="margin-top:1rem;"><strong>Comandos clave para recordar:</strong></p>
                <pre><code>dotnet new console -n CalculadoraModular
cd CalculadoraModular
dotnet run</code></pre>
                <p style="color:var(--green);font-size:1.1rem;margin-top:1rem;">¡Terminaste el Módulo 1!</p>`
            }
        ];

        let current = 0;
        const slideEl = document.getElementById('slide');
        const counterEl = document.getElementById('counter');
        const tocEl = document.getElementById('toc');
        const dotsContainer = document.getElementById('dotsContainer');

        function renderSlide() {
            slideEl.innerHTML = slides[current].content;
            counterEl.textContent = `${current + 1} / ${slides.length}`;
            document.getElementById('prevBtn').disabled = current === 0;
            document.getElementById('nextBtn').disabled = current === slides.length - 1;
            document.querySelectorAll('.sidebar li').forEach((li, i) => li.classList.toggle('active', i === current));
            document.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === current));
        }

        function nextSlide() { if (current < slides.length - 1) { current++; renderSlide(); } }
        function prevSlide() { if (current > 0) { current--; renderSlide(); } }

        document.addEventListener('keydown', e => {
            if (e.key === 'ArrowRight') nextSlide();
            if (e.key === 'ArrowLeft') prevSlide();
        });

        slides.forEach((s, i) => {
            const li = document.createElement('li');
            li.textContent = s.title;
            li.onclick = () => { current = i; renderSlide(); };
            tocEl.appendChild(li);
            const dot = document.createElement('span');
            dot.className = 'dot';
            dot.onclick = () => { current = i; renderSlide(); };
            dotsContainer.appendChild(dot);
        });

        renderSlide();
    </script>
</body>
</html>
